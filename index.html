<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>文件上传</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            padding: 20px;
            padding-bottom: 100px;
        }
        .upload-area {
            background: #fff;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .upload-btn {
            background: linear-gradient(135deg, #409eff 0%, #67c23a 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 44px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .file-list {
            background: #fff;
            border-radius: 16px;
            padding: 8px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .file-info {
            flex: 1;
            overflow: hidden;
        }
        .file-name {
            font-size: 14px;
            color: #333;
            word-break: break-all;
            margin-bottom: 4px;
        }
        .file-size {
            font-size: 12px;
            color: #999;
        }
        .delete-btn {
            background: #fef0f0;
            color: #f56c6c;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            margin-left: 12px;
        }
        .delete-btn:active {
            opacity: 0.7;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
            display: none;
            white-space: nowrap;
        }
        .uploading-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
        }
        .uploading-name {
            font-size: 14px;
            color: #666;
        }
        .uploading-progress {
            font-size: 12px;
            color: #409eff;
        }
    </style>
</head>
<body>
    <div class="upload-area">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📎 选择文件</button>
        <input type="file" id="fileInput" style="display: none;" multiple>
    </div>
    <div class="file-list" id="fileList"></div>
    <div id="toast" class="toast"></div>

    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script>
        // --- 获取参数 ---
        function getUrlParam(name) {
            const reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            const r = window.location.search.substr(1).match(reg);
            return r ? decodeURIComponent(r[2]) : null;
        }
        const token = getUrlParam('token');
        const UPLOAD_URL = 'https://xglwx.siglenlift.cn/testfile/api/Upload';
        
        let uploadedFiles = []; // 只存储成功上传的文件
        let uploadingCount = 0; // 正在上传的文件数量

        // --- 工具函数 ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 只渲染成功的文件列表
        function renderFileList() {
            const container = document.getElementById('fileList');
            if (uploadedFiles.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无文件</div>';
                return;
            }
            let html = '';
            uploadedFiles.forEach((file, index) => {
                html += `
                    <div class="file-item" data-index="${index}">
                        <div class="file-info">
                            <div class="file-name">${escapeHtml(file.name)}</div>
                            <div class="file-size">${file.size}</div>
                        </div>
                        <button class="delete-btn" data-index="${index}">🗑️</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.getAttribute('data-index'));
                    if (!isNaN(idx)) {
                        uploadedFiles.splice(idx, 1);
                        renderFileList();
                        showToast('已删除');
                    }
                });
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // --- 上传单个文件（失败不会添加到列表）---
        function uploadFile(file) {
            uploadingCount++;
            
            const formData = new FormData();
            formData.append('file', file);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', UPLOAD_URL, true);
            if (token) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            }

            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        const result = JSON.parse(xhr.responseText);
                        const fileUrl = result.data?.url || result.url || '';
                        if (fileUrl) {
                            // ✅ 只有成功才添加到数组
                            uploadedFiles.push({
                                name: file.name,
                                url: fileUrl,
                                size: formatFileSize(file.size)
                            });
                            renderFileList();
                            showToast(`${file.name} 上传成功`);
                        } else {
                            // ❌ 没有 URL = 失败，不添加到列表
                            showToast(`${file.name} 上传失败：未返回文件地址`);
                        }
                    } catch (e) {
                        // ❌ 解析失败 = 失败，不添加到列表
                        showToast(`${file.name} 上传失败：解析错误`);
                    }
                } else {
                    // ❌ HTTP 错误 = 失败，不添加到列表
                    showToast(`${file.name} 上传失败 (${xhr.status})`);
                }
                uploadingCount--;
            };

            xhr.onerror = function() {
                // ❌ 网络错误 = 失败，不添加到列表
                showToast(`${file.name} 网络错误，上传失败`);
                uploadingCount--;
            };

            xhr.send(formData);
        }

        // 选择文件处理
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files.length) return;
            showToast(`开始上传 ${files.length} 个文件...`);
            for (let i = 0; i < files.length; i++) {
                uploadFile(files[i]);
            }
            e.target.value = '';
        });

        // --- 完成并返回小程序 ---
        function finishAndReturn() {
            if (window.wx && window.wx.miniProgram) {
                window.wx.miniProgram.postMessage({
                    data: { 
                        type: 'upload_success', 
                        files: uploadedFiles.map(f => ({ name: f.name, url: f.url, size: f.size }))
                    }
                });
                setTimeout(() => {
                    window.wx.miniProgram.navigateBack();
                }, 150);
            } else {
                alert('上传完成，请在微信小程序中使用');
            }
        }

        // 添加完成按钮
        const btn = document.createElement('button');
        btn.innerText = '✓ 完成并返回';
        btn.style.position = 'fixed';
        btn.style.bottom = '20px';
        btn.style.left = '20px';
        btn.style.right = '20px';
        btn.style.padding = '12px';
        btn.style.backgroundColor = '#fff';
        btn.style.border = '1px solid #ddd';
        btn.style.borderRadius = '44px';
        btn.style.fontSize = '16px';
        btn.style.color = '#409eff';
        btn.style.fontWeight = 'bold';
        btn.onclick = () => {
            if (uploadedFiles.length > 0) {
                finishAndReturn();
            } else {
                showToast('请先上传文件');
            }
        };
        document.body.appendChild(btn);
    </script>
</body>
</html>
