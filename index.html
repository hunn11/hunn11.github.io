<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>选择文件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-area {
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 350px;
        }
        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h3 {
            font-size: 20px;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .sub {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .file-input {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #409eff 0%, #67c23a 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 44px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(64,158,255,0.3);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn.disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }
        .error {
            color: #f56c6c;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body>
    <div class="upload-area">
        <div class="upload-icon">📎</div>
        <h3>选择本地文件</h3>
        <div class="sub">支持 PDF、Word、Excel、图片等</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.txt" />
        <button class="btn" id="selectBtn">选择文件</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        const MAX_SIZE = 20 * 1024 * 1024;
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            setTimeout(() => { el.textContent = ''; }, 3000);
        }

        function getFileType(filename) {
            const ext = filename.split('.').pop()?.toLowerCase() || '';
            const typeMap = {
                'pdf': 'application/pdf',
                'doc': 'application/msword',
                'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'xls': 'application/vnd.ms-excel',
                'xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'jpg': 'image/jpeg',
                'jpeg': 'image/jpeg',
                'png': 'image/png',
                'txt': 'text/plain'
            };
            return typeMap[ext] || 'application/octet-stream';
        }

        function readAndSend(file) {
            if (file.size > MAX_SIZE) {
                showError(`文件不能超过 20MB`);
                return false;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                const pureBase64 = base64.split(',')[1];
                
                const fileData = {
                    name: file.name,
                    size: file.size,
                    type: file.type || getFileType(file.name),
                    base64: pureBase64
                };
                
                if (window.wx && window.wx.miniProgram) {
                    window.wx.miniProgram.postMessage({
                        data: { type: 'file_selected', file: fileData }
                    });
                    
                    setTimeout(() => {
                        window.wx.miniProgram.navigateBack({ delta: 1 });
                    }, 100);
                } else {
                    showError('不在小程序环境中');
                }
            };
            
            reader.onerror = function() {
                showError('文件读取失败');
            };
            
            reader.readAsDataURL(file);
            return true;
        }

        const selectBtn = document.getElementById('selectBtn');
        const fileInput = document.getElementById('fileInput');
        
        selectBtn.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            selectBtn.disabled = true;
            selectBtn.textContent = '处理中...';
            selectBtn.classList.add('disabled');
            
            readAndSend(file);
            
            fileInput.value = '';
            
            setTimeout(() => {
                selectBtn.disabled = false;
                selectBtn.textContent = '选择文件';
                selectBtn.classList.remove('disabled');
            }, 2000);
        });
    </script>
</body>
</html>
